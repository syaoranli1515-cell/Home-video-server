<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Video Server</title>
  <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
  <style>
    :root{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--focus-ring:#fbbf24}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
    .navbar{background:var(--bg-secondary);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .logo{font-size:1.5rem;font-weight:bold;display:flex;align-items:center;gap:0.5rem}
    .nav-folders{display:flex;gap:0.5rem;overflow-x:auto;padding:0.5rem 0;max-width:70%}
    .folder-btn{background:var(--bg-card);border:2px solid transparent;color:var(--text-primary);padding:0.5rem 1rem;border-radius:8px;cursor:pointer;white-space:nowrap;font-size:0.9rem;transition:all 0.2s}
    .folder-btn:hover,.folder-btn.active{background:var(--accent)}
    .folder-btn:focus{outline:none;border-color:var(--focus-ring);box-shadow:0 0 0 3px rgba(251,191,36,0.3)}
    .rescan-btn{background:transparent;border:2px solid var(--text-secondary);color:var(--text-secondary);padding:0.5rem;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .rescan-btn:hover{border-color:var(--text-primary);color:var(--text-primary)}
    .rescan-btn:focus{outline:none;border-color:var(--focus-ring);box-shadow:0 0 0 3px rgba(251,191,36,0.3)}
    .main-content{padding:1.5rem}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    .video-card{background:var(--bg-secondary);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:3px solid transparent}
    .video-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
    .video-card:focus{outline:none;border-color:var(--focus-ring);box-shadow:0 0 0 3px rgba(251,191,36,0.3),0 8px 24px rgba(0,0,0,0.4)}
    .thumbnail-container{position:relative;aspect-ratio:16/9;background:var(--bg-card);overflow:hidden}
    .thumbnail{width:100%;height:100%;object-fit:cover}
    .thumbnail-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-card);color:var(--text-secondary)}
    .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(0,0,0,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
    .video-card:hover .play-icon,.video-card:focus .play-icon{opacity:1}
    .video-info{padding:1rem}
    .video-title{font-size:1rem;font-weight:600;margin-bottom:0.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .video-meta{display:flex;justify-content:space-between;font-size:0.85rem;color:var(--text-secondary)}
    .player-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center}
    .player-modal.active{display:flex}
    .player-container{width:90%;max-width:1200px;position:relative}
    .close-player{position:absolute;top:-40px;right:0;background:transparent;border:none;color:white;font-size:2rem;cursor:pointer;padding:0.5rem}
    .close-player:focus{outline:2px solid var(--focus-ring)}
    .onboarding{display:none;min-height:100vh;align-items:center;justify-content:center;padding:2rem}
    .onboarding.active{display:flex}
    .onboarding-card{background:var(--bg-secondary);padding:2rem;border-radius:16px;max-width:500px;width:100%;text-align:center}
    .onboarding h1{margin-bottom:1.5rem;font-size:1.8rem}
    .form-group{margin-bottom:1.5rem;text-align:left}
    .form-group label{display:block;margin-bottom:0.5rem;color:var(--text-secondary)}
    .form-group input{width:100%;padding:0.75rem;border:2px solid var(--bg-card);border-radius:8px;background:var(--bg-primary);color:var(--text-primary);font-size:1rem}
    .form-group input:focus{outline:none;border-color:var(--accent)}
    .btn-primary{background:var(--accent);color:white;border:none;padding:0.75rem 2rem;border-radius:8px;font-size:1rem;cursor:pointer;width:100%;transition:background 0.2s}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:focus{outline:none;box-shadow:0 0 0 3px rgba(251,191,36,0.5)}
    .btn-primary:disabled{background:var(--bg-card);cursor:not-allowed}
    .error-message{color:#ef4444;margin-top:0.5rem;font-size:0.9rem}
    .loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--text-secondary);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .scan-results{margin-top:1.5rem;padding:1rem;background:var(--bg-primary);border-radius:8px;text-align:left}
    .scan-results h3{margin-bottom:0.5rem;color:var(--accent)}
    .scan-results ul{list-style:none;color:var(--text-secondary)}
    .scan-results li{padding:0.25rem 0}
    @media(max-width:768px){.navbar{flex-wrap:wrap;gap:1rem}.nav-folders{max-width:100%;order:2}.video-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}.main-content{padding:1rem}}
    .icon{width:24px;height:24px;fill:currentColor}
  </style>
</head>
<body>
  <div id="onboarding" class="onboarding">
    <div class="onboarding-card">
      <h1>🎬 Welcome to Home Video Server</h1>
      <div id="step-ffmpeg">
        <p style="margin-bottom:1rem;color:var(--text-secondary)">First, locate FFmpeg for video processing.</p>
        <div class="form-group">
          <label for="ffmpeg-path">FFmpeg Executable Path</label>
          <input type="text" id="ffmpeg-path" placeholder="e.g., C:\ffmpeg\bin\ffmpeg.exe or /usr/bin/ffmpeg">
          <p id="ffmpeg-error" class="error-message"></p>
        </div>
        <button class="btn-primary" id="btn-ffmpeg" onclick="submitFFmpeg()">Verify & Continue</button>
      </div>
      <div id="step-media" style="display:none">
        <p style="margin-bottom:1rem;color:var(--text-secondary)">Now select your media directory containing video files.</p>
        <div class="form-group">
          <label for="media-path">Media Directory Path</label>
          <input type="text" id="media-path" placeholder="e.g., D:\Videos or /home/user/videos">
          <p id="media-error" class="error-message"></p>
        </div>
        <button class="btn-primary" id="btn-media" onclick="submitMedia()">
          <span id="media-btn-text">Scan & Finish Setup</span>
          <span id="media-loading" style="display:none"><span class="loading-spinner"></span> Scanning...</span>
        </button>
        <div id="scan-results" class="scan-results" style="display:none"></div>
      </div>
    </div>
  </div>
  <div id="app" style="display:none">
    <nav class="navbar">
      <div class="logo"><svg class="icon" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>Home Video</div>
      <div class="nav-folders" id="folder-nav"></div>
      <button class="rescan-btn" onclick="triggerRescan()" title="Rescan Library"><svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
    </nav>
    <main class="main-content"><div class="video-grid" id="video-grid"></div></main>
  </div>
  <div id="player-modal" class="player-modal">
    <div class="player-container">
      <button class="close-player" onclick="closePlayer()">&times;</button>
      <video id="video-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="auto"><source src="" type="video/mp4"></video>
    </div>
  </div>
  <script src="https://vjs.zencdn.net/8.6.1/video-js.min.js"></script>
  <script>
    let player=null,currentFolder='All';
    async function init(){try{const r=await fetch('/api/setup-status'),d=await r.json();if(!d.isSetup){document.getElementById('onboarding').classList.add('active')}else{document.getElementById('app').style.display='block';loadFolders();loadVideos()}}catch(e){console.error('Init failed:',e)}}
    async function submitFFmpeg(){const p=document.getElementById('ffmpeg-path').value.trim(),e=document.getElementById('ffmpeg-error'),b=document.getElementById('btn-ffmpeg');if(!p){e.textContent='Please enter FFmpeg path';return}b.disabled=true;b.innerHTML='<span class="loading-spinner"></span> Verifying...';try{const r=await fetch('/api/setup/ffmpeg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ffmpegPath:p})}),d=await r.json();if(r.ok){document.getElementById('step-ffmpeg').style.display='none';document.getElementById('step-media').style.display='block'}else{e.textContent=d.error||'Invalid FFmpeg path';b.disabled=false;b.textContent='Verify & Continue'}}catch(err){e.textContent='Connection error';b.disabled=false;b.textContent='Verify & Continue'}}
    async function submitMedia(){const p=document.getElementById('media-path').value.trim(),e=document.getElementById('media-error'),b=document.getElementById('btn-media'),bt=document.getElementById('media-btn-text'),ld=document.getElementById('media-loading');if(!p){e.textContent='Please enter media directory path';return}b.disabled=true;bt.style.display='none';ld.style.display='inline';try{const r=await fetch('/api/setup/media',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mediaPath:p})}),d=await r.json();if(r.ok){const res=d.results;document.getElementById('scan-results').innerHTML='<h3>✅ Setup Complete!</h3><ul><li>Total videos: '+res.total+'</li><li>Processed: '+res.processed+'</li><li>Folders: '+(res.folders.length>0?res.folders.join(', '):'None')+'</li></ul>';document.getElementById('scan-results').style.display='block';setTimeout(()=>{document.getElementById('onboarding').classList.remove('active');document.getElementById('app').style.display='block';loadFolders();loadVideos()},3000)}else{e.textContent=d.error||'Scan failed';b.disabled=false;bt.style.display='inline';ld.style.display='none'}}catch(err){e.textContent='Connection error';b.disabled=false;bt.style.display='inline';ld.style.display='none'}}
    async function loadFolders(){try{const r=await fetch('/api/folders'),folders=await r.json(),nav=document.getElementById('folder-nav');nav.innerHTML='<button class="folder-btn '+(currentFolder==='All'?'active':'')+'" onclick="selectFolder(\'All\')" tabindex="0">All</button>';folders.forEach(f=>{const b=document.createElement('button');b.className='folder-btn '+(currentFolder===f?'active':'');b.textContent=f;b.onclick=()=>selectFolder(f);b.tabIndex=0;nav.appendChild(b)})}catch(err){console.error('Load folders failed:',err)}}
    function selectFolder(f){currentFolder=f;document.querySelectorAll('.folder-btn').forEach(b=>{b.classList.toggle('active',b.textContent===f||(f==='All'&&b.textContent==='All'))});loadVideos()}
    async function loadVideos(){try{const r=await fetch('/api/videos?folder='+encodeURIComponent(currentFolder)),videos=await r.json(),grid=document.getElementById('video-grid');if(videos.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-secondary)"><svg class="icon" style="width:64px;height:64px;margin:0 auto 1rem" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg><p>No videos found</p></div>';return}grid.innerHTML=videos.map(v=>{const dur=formatDuration(v.duration),hasThumb=v.thumbnail_path;return '<div class="video-card" tabindex="0" onclick="playVideo('+v.id+')" onkeydown="handleCardKey(event,'+v.id+')"><div class="thumbnail-container">'+(hasThumb?'<img src="'+hasThumb+'" alt="'+v.filename+'" class="thumbnail" loading="lazy">':'<div class="thumbnail-placeholder"><svg class="icon" style="width:48px;height:48px" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg></div>')+'<div class="play-icon"><svg class="icon" style="width:24px;height:24px;fill:white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div><div class="video-info"><div class="video-title" title="'+v.filename+'">'+v.filename+'</div><div class="video-meta"><span>'+dur+'</span><span>'+v.folder_name+'</span></div></div></div>'}).join('')}catch(err){console.error('Load videos failed:',err)}}
    function formatDuration(s){if(!s)return'Unknown';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+sec.toString().padStart(2,'0')}
    function playVideo(id){const modal=document.getElementById('player-modal');if(player)player.dispose();player=videojs('video-player',{fluid:true,responsive:true});player.src({src:'/api/video/'+id,type:'video/mp4'});modal.classList.add('active');player.play()}
    function closePlayer(){const modal=document.getElementById('player-modal');modal.classList.remove('active');if(player){player.pause();player.dispose();player=null}}
    function handleCardKey(e,id){if(e.key==='Enter'||e.key===' '){e.preventDefault();playVideo(id)}}
    async function triggerRescan(){const b=document.querySelector('.rescan-btn');b.style.opacity='0.5';try{const r=await fetch('/api/rescan',{method:'POST'}),d=await r.json();if(r.ok)alert('Rescan complete!\nTotal: '+d.results.total+'\nProcessed: '+d.results.processed+'\nFailed: '+d.results.failed);else alert('Rescan failed: '+d.error)}catch(err){alert('Rescan failed: '+err.message)}finally{b.style.opacity='1'}}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closePlayer()});
    init();
  </script>
</body>
</html>
